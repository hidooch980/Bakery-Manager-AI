services:
  db:
    image: postgres:16-alpine
    container_name: bakery_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bakery
      POSTGRES_USER: bakery
      POSTGRES_PASSWORD: bakery
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakery -d bakery"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bakery_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://bakery:bakery@db:5432/bakery
      JWT_SECRET: change_me_in_production
    ports:
      - "3000:3000"
    command: sh -c "npm run prisma:migrate && npm run prisma:seed && npm run start:dev"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bakery_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    command: sh -c "npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
