name: Android APK Build Fixed

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: flutter build apk --release --dart-define=API_BASE_URL=${API_BASE_URL:-http://185.97.118.255:3000}

      - name: Read app version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          cp build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/BakeryManagerAI-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BakeryManagerAI-v${{ steps.version.outputs.version }}
          path: mobile/build/app/outputs/flutter-apk/BakeryManagerAI-v${{ steps.version.outputs.version }}.apk
